<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">CalibrX SDK</title>
  <desc id="desc">CalibrX SDK banner using the camera records design language.</desc>

  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="rgba(0,0,0,0.045)" stroke-width="1"/>
    </pattern>
  </defs>

  <style>
    .font-serif {
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    .font-mono {
      font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
    }
  </style>

  <rect width="1280" height="360" fill="#f4f1e8"/>
  <rect width="1280" height="360" fill="url(#grid)"/>

  <g transform="translate(86 72)">
    <rect width="1108" height="104" fill="#ffffff" stroke="#0a0a08" stroke-width="1.5"/>

    <g transform="translate(28 30)">
      <circle cx="22" cy="22" r="22" fill="#0d4225"/>
      <circle cx="22" cy="22" r="27" fill="none" stroke="#0d4225" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>
      <text class="font-mono" x="22" y="27" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">SDK</text>
    </g>

    <g transform="translate(96 26)">
      <text class="font-serif" x="0" y="39" fill="#0a0a08" font-size="52" font-weight="500" letter-spacing="-0.01em">Calibr</text>
      <text class="font-serif" x="138" y="39" fill="#0d4225" font-size="52" font-style="italic" font-weight="600" letter-spacing="-0.01em">X</text>
      <text class="font-serif" x="178" y="39" fill="#0a0a08" font-size="52" font-weight="500" letter-spacing="-0.01em">SDK</text>
      <text class="font-serif" x="390" y="40" fill="#4a4a44" font-size="22" font-style="italic" font-weight="400">
        Apply calibration exports locally with Python and OpenCV.
      </text>
    </g>
  </g>

  <g transform="translate(86 206)">
    <rect width="1108" height="82" fill="#ffffff" stroke="#0a0a08" stroke-width="1.5"/>

    <g transform="translate(30 23)">
      <text class="font-mono" x="0" y="11" fill="#0d4225" font-size="10" font-weight="700" letter-spacing="2.2">SUPPORTED MODELS</text>
      <text class="font-serif" x="0" y="43" fill="#0a0a08" font-size="24" font-weight="500" letter-spacing="-0.01em">Pinhole, pinhole wide, and fisheye</text>
    </g>

    <g transform="translate(624 23)">
      <rect width="118" height="34" fill="#ebf2ed" stroke="#0d4225" stroke-width="1"/>
      <text class="font-mono" x="59" y="22" text-anchor="middle" fill="#0d4225" font-size="10" font-weight="700" letter-spacing="1.4">PINHOLE</text>

      <rect x="138" width="164" height="34" fill="#ebf2ed" stroke="#0d4225" stroke-width="1"/>
      <text class="font-mono" x="220" y="22" text-anchor="middle" fill="#0d4225" font-size="10" font-weight="700" letter-spacing="1.4">PINHOLE WIDE</text>

      <rect x="322" width="118" height="34" fill="#f7ecd4" stroke="#8b4f15" stroke-width="1"/>
      <text class="font-mono" x="381" y="22" text-anchor="middle" fill="#8b4f15" font-size="10" font-weight="700" letter-spacing="1.4">FISHEYE</text>
    </g>
  </g>
</svg>
