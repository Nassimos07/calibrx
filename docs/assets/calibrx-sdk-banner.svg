<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">CalibrX SDK</title>
  <desc id="desc">CalibrX wordmark with SDK badge and local calibration export tagline.</desc>

  <style>
    .logo-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: 96px;
      letter-spacing: -0.02em;
    }

    .mono {
      font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
    }
  </style>

  <rect width="1280" height="360" rx="28" fill="#fbfaf6"/>
  <rect x="0.5" y="0.5" width="1279" height="359" rx="27.5" fill="none" stroke="#0a0a08" stroke-opacity="0.14"/>
  <path d="M88 286H1192" stroke="#0a0a08" stroke-opacity="0.14" stroke-width="1.5"/>
  <path d="M88 74H1192" stroke="#0a0a08" stroke-opacity="0.08" stroke-width="1"/>

  <g transform="translate(342 86)">
    <text class="logo-text" x="0" y="94" fill="#0a0a08">Calibr</text>

    <g transform="translate(252 7) scale(1.1)">
      <circle cx="40" cy="40" r="32" fill="none" stroke="#0a0a08" stroke-width="2.2"/>
      <line x1="16" y1="16" x2="64" y2="64" stroke="#0d4225" stroke-width="5.5" stroke-linecap="square"/>
      <line x1="64" y1="16" x2="16" y2="64" stroke="#0d4225" stroke-width="5.5" stroke-linecap="square"/>
      <circle cx="40" cy="40" r="5" fill="#ffffff" stroke="#0a0a08" stroke-width="1.5"/>
    </g>

    <rect x="376" y="32" width="108" height="46" rx="23" fill="#0d4225"/>
    <text class="mono" x="430" y="62" text-anchor="middle" fill="#fbfaf6" font-size="20" font-weight="700" letter-spacing="3.5">SDK</text>

    <text class="mono" x="2" y="146" fill="#3b3a35" font-size="19" letter-spacing="0.04em">
      Apply CalibrX calibration exports locally with Python and OpenCV.
    </text>
  </g>

  <g transform="translate(406 246)">
    <rect width="126" height="32" rx="16" fill="#ffffff" stroke="#0a0a08" stroke-opacity="0.18"/>
    <text class="mono" x="63" y="21" text-anchor="middle" fill="#0a0a08" font-size="13" font-weight="700" letter-spacing="1.5">PINHOLE</text>

    <rect x="144" width="178" height="32" rx="16" fill="#ffffff" stroke="#0a0a08" stroke-opacity="0.18"/>
    <text class="mono" x="233" y="21" text-anchor="middle" fill="#0a0a08" font-size="13" font-weight="700" letter-spacing="1.5">PINHOLE WIDE</text>

    <rect x="340" width="128" height="32" rx="16" fill="#ffffff" stroke="#0a0a08" stroke-opacity="0.18"/>
    <text class="mono" x="404" y="21" text-anchor="middle" fill="#0d4225" font-size="13" font-weight="800" letter-spacing="1.5">FISHEYE</text>
  </g>
</svg>
